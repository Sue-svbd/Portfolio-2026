name: Deploy to GitHub Pages

on:
  push:
    branches: ['main'] # Or 'master', depending on your default branch name

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm' # Change to 'yarn' or 'pnpm' if you don't use npm
      - name: Install dependencies
        run: npm install # Change to 'yarn' or 'pnpm install' if needed
      - name: Build
        run: npm run build # Change to 'yarn build' or 'pnpm run build' if needed
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist' # This is the folder Vite builds to
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4